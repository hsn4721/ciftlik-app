name: iOS Release

on:
  push:
    branches: [master]

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Flutter setup
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Import code signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.CERTIFICATE_P12_BASE64 }}
          p12-password: ${{ secrets.CERTIFICATE_P12_PASSWORD }}

      - name: Install provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Configure Xcode signing (Runner target only)
        run: |
          ruby - <<'EOF'
          require 'xcodeproj'
          project = Xcodeproj::Project.open('ios/Runner.xcodeproj')
          project.targets.each do |target|
            next unless target.name == 'Runner'
            target.build_configurations.each do |config|
              next unless config.name == 'Release'
              config.build_settings['CODE_SIGN_STYLE'] = 'Manual'
              config.build_settings['CODE_SIGN_IDENTITY'] = 'iPhone Distribution'
              config.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = 'CiftlikPRO AppStore'
              config.build_settings['DEVELOPMENT_TEAM'] = ENV['APPLE_TEAM_ID']
            end
          end
          project.save
          EOF
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Update ExportOptions with Team ID
        run: |
          sed -i '' "s/TEAM_ID_PLACEHOLDER/${{ secrets.APPLE_TEAM_ID }}/g" ios/ExportOptions.plist

      - name: Flutter build IPA
        run: |
          flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      - name: Upload to TestFlight
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -1)
          echo "Uploading: $IPA_PATH"
          xcrun altool --upload-app \
            --file "$IPA_PATH" \
            --type ios \
            --apiKey "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
            --apiIssuer "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"
